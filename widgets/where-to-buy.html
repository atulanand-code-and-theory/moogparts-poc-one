<div class="where-to-buy-shell">
  <div class="where-to-buy-search" aria-label="Where to buy search">
    <form class="where-to-buy-form" action="/where-to-buy" method="get">
      <label class="where-to-buy-field">
        <span class="sr-only">Enter ZIP/Postal Code</span>
        <input
          class="where-to-buy-input"
          name="zip"
          type="search"
          placeholder="Enter ZIP/Postal Code"
          autocomplete="off"
          disabled
        >
      </label>
      <button class="button-main where-to-buy-button" type="submit" disabled>Search</button>
    </form>
  </div>
</div>
