<div class="search-files-shell">
  <div class="search-files-search">
    <h2 class="search-files-heading">WE GIVE YOU SOLUTIONS</h2>
    <p class="search-files-intro">
      Stay up to date on our continuous product improvements and technological
      developments with our library of bulletins. Search our bulletin library by
      MOOG part number, vehicle make/model, component type, or failure mode.
    </p>
    <form class="search-files-form" action="#" method="get">
      <label class="search-files-field">
        <span class="sr-only">Search bulletins</span>
        <input
          class="search-files-input"
          name="q"
          type="search"
          placeholder="Search"
          autocomplete="off"
          disabled
        >
      </label>
      <button class="button-main search-files-button" type="submit" disabled>Search</button>
    </form>
  </div>
  <div class="search-files-results">
    <h2 class="search-files-results-heading">Most Recent</h2>
    <ul class="search-files-list">
      <li class="search-files-item">
        <span class="search-files-name">Bulletin library loads at runtime</span>
        <span class="search-files-date"></span>
      </li>
    </ul>
  </div>
</div>
