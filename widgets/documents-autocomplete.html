<div class="documents-autocomplete-shell">
  <div class="documents-autocomplete-intro">
    <h3 class="documents-autocomplete-heading">Installation Instructions</h3>
    <h5 class="documents-autocomplete-sub">
      Certain part numbers do not have instruction sheets. If you cannot find
      your instruction sheet or your part does not have one, please call the
      technical line for product support at 1.800.325.8886.
    </h5>
  </div>
  <form class="documents-autocomplete-form" action="#" method="get">
    <label class="documents-autocomplete-field">
      <span class="sr-only">Search for a part number</span>
      <input
        class="documents-autocomplete-input"
        name="part-number"
        type="search"
        placeholder="Search for a part number"
        autocomplete="off"
        disabled
      >
    </label>
  </form>
</div>
